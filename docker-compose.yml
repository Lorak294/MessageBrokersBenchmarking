services:
  orchestrator:
    build:
      context: .
      dockerfile: src/MqBenchmark.Orchestrator/Dockerfile
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: src/MqBenchmark.Worker/Dockerfile
    environment:
      - OrchestratorUrl=http://orchestrator:8080/orchestrator
    depends_on:
      orchestrator:
        condition: service_healthy
    deploy:
#      resources:
#        limits:
#          memory: 512M

  rabbitmq:
    image: rabbitmq:3-management
    command: >
      bash -c "rabbitmq-plugins enable --offline rabbitmq_stream && rabbitmq-server"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "5552:5552"
    profiles: [rabbitmq]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  kafka:
    image: apache/kafka-native:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MqBenchmarkKafkaClusterId01
    profiles: [kafka]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
 
  pgmq:
    image: ghcr.io/pgmq/pg18-pgmq:v1.11.0
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
    profiles: [pgmq]
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
